<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG 知识库</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"Segoe UI",system-ui,sans-serif;background:#f5f5f7;height:100vh;display:flex;flex-direction:column}
header{padding:16px 20px 12px;background:#fff;border-bottom:1px solid #e5e5ea}
h1{font-size:17px;font-weight:600;color:#1d1d1f;margin-bottom:2px}
.sub{font-size:12px;color:#86868b}
#messages{flex:1;overflow-y:auto;padding:16px 20px 8px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user{background:#0071e3;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.assistant{background:#fff;color:#1d1d1f;align-self:flex-start;border-bottom-left-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.msg.time{font-size:11px;color:#86868b;align-self:center;background:transparent;box-shadow:none;padding:4px 0}
.typing{color:#86868b;font-size:13px;align-self:flex-start;padding:4px 0;display:none}
.typing.show{display:block}
#input-area{padding:8px 20px 16px;background:#fff;border-top:1px solid #e5e5ea}
.mode-bar{display:flex;gap:12px;align-items:center;margin-bottom:8px}
.mode-bar label{font-size:13px;display:flex;align-items:center;gap:4px;cursor:pointer;color:#515154}
.mode-bar input[type=radio]{accent-color:#0071e3}
.bottom-row{display:flex;gap:8px;align-items:flex-end}
textarea{flex:1;padding:8px 12px;border:1px solid #d2d2d7;border-radius:10px;font-size:14px;font-family:inherit;resize:none;outline:none;min-height:40px;max-height:120px;line-height:1.4}
textarea:focus{border-color:#0071e3;box-shadow:0 0 0 3px rgba(0,113,227,.12)}
.btn{background:#0071e3;color:#fff;border:none;border-radius:20px;padding:8px 20px;font-size:14px;cursor:pointer;white-space:nowrap;height:40px}
.btn:hover{background:#0077ed}
.btn:disabled{opacity:.4;cursor:default}
</style>
</head>
<body>

<header>
<h1>RAG 知识库</h1>
<div class="sub">基于笔记的问答 / Agent 聊天 / 联网搜索</div>
</header>

<div id="messages">
<div class="typing" id="typing">正在回答...</div>
</div>

<div id="input-area">
<div class="mode-bar">
<label><input type="radio" name="mode" value="query" checked> 严格 RAG</label>
<label><input type="radio" name="mode" value="chat"> Agent 模式</label>
</div>
<div class="bottom-row">
<textarea id="input" rows="1" placeholder="输入问题，Enter 发送，Shift+Enter 换行"></textarea>
<button class="btn" id="sendBtn">发送</button>
</div>
</div>

<script>
const input = document.getElementById("input");
const sendBtn = document.getElementById("sendBtn");
const messages = document.getElementById("messages");
const typing = document.getElementById("typing");
let history = [];

function addMsg(role, text) {
    const div = document.createElement("div");
    div.className = "msg " + role;
    div.textContent = text;
    messages.insertBefore(div, typing);
    history.push({role, text});
    messages.scrollTop = messages.scrollHeight;
}

function scrollToBottom() {
    messages.scrollTop = messages.scrollHeight;
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
    }
});

input.addEventListener("input", function() {
    this.style.height = "auto";
    this.style.height = Math.min(this.scrollHeight, 120) + "px";
});

sendBtn.addEventListener("click", send);

async function send() {
    const q = input.value.trim();
    if (!q) return;
    const mode = document.querySelector('input[name="mode"]:checked').value;
    input.value = "";
    input.style.height = "auto";
    addMsg("user", q);
    typing.className = "typing show";
    sendBtn.disabled = true;
    try {
        const resp = await fetch("/" + mode, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({question: q})
        });
        const data = await resp.json();
        typing.className = "typing";
        addMsg("assistant", data.answer || data.detail || "无返回");
    } catch(e) {
        typing.className = "typing";
        addMsg("assistant", "请求失败: " + e);
    } finally {
        sendBtn.disabled = false;
        input.focus();
    }
}
</script>
</body>
</html>
